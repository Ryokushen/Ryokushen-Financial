<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryokushen Financial - Modern UI</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Modern UI Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/glassmorphism.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- Background Effects -->
    <div class="background-effects">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>
    
    <!-- Main App Container -->
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">💎</span>
                    <span class="logo-text">Ryokushen</span>
                </div>
                <button class="sidebar-toggle" id="sidebar-toggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Dashboard</span>
                </li>
                <li class="nav-item" data-page="accounts">
                    <span class="nav-icon">💰</span>
                    <span class="nav-text">Accounts</span>
                </li>
                <li class="nav-item" data-page="transactions">
                    <span class="nav-icon">📈</span>
                    <span class="nav-text">Transactions</span>
                </li>
                <li class="nav-item" data-page="bills">
                    <span class="nav-icon">📅</span>
                    <span class="nav-text">Bills</span>
                </li>
                <li class="nav-item" data-page="investments">
                    <span class="nav-icon">💹</span>
                    <span class="nav-text">Investments</span>
                </li>
                <li class="nav-item" data-page="rules">
                    <span class="nav-icon">⚡</span>
                    <span class="nav-text">Smart Rules</span>
                </li>
                <li class="nav-item" data-page="settings">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">Settings</span>
                </li>
            </ul>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div class="user-details">
                        <div class="user-name" id="user-name">Loading...</div>
                        <div class="user-email" id="user-email">...</div>
                    </div>
                </div>
                <button class="logout-btn" id="logout-btn">
                    <span class="logout-icon">🚪</span>
                </button>
            </div>
        </nav>
        
        <!-- Main Content Area -->
        <main class="main-content" id="main-content">
            <!-- Top Bar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="mobile-menu-toggle" id="mobile-menu-toggle">☰</button>
                    <h1 class="page-title" id="page-title">Dashboard</h1>
                </div>
                <div class="topbar-right">
                    <button class="theme-toggle" id="theme-toggle">
                        <span class="theme-icon">🌙</span>
                    </button>
                    <button class="notifications-toggle" id="notifications-toggle">
                        <span class="notification-icon">🔔</span>
                        <span class="notification-badge">3</span>
                    </button>
                </div>
            </header>
            
            <!-- Page Content -->
            <div class="page-content" id="page-content">
                <!-- Content will be dynamically loaded here -->
            </div>
        </main>
    </div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Ryokushen...</div>
    </div>
    
    <!-- Auth Modal -->
    <div class="auth-modal" id="auth-modal" style="display: none;">
        <div class="auth-container glass-panel">
            <div class="auth-header">
                <h2>Welcome to Ryokushen</h2>
                <p>Your personal financial command center</p>
            </div>
            <div class="auth-content" id="auth-content">
                <!-- Auth forms will be inserted here -->
            </div>
        </div>
    </div>
    
    <!-- Modern UI Scripts -->
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>

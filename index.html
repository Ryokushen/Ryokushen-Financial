<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryokushen Financial - Modern UI</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Modern UI Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/glassmorphism.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/dashboard-updates.css">
    <link rel="stylesheet" href="css/sidebar-redesign.css">
    <link rel="stylesheet" href="css/dashboard-effects.css">
    <link rel="stylesheet" href="css/charts.css">
    <link rel="stylesheet" href="css/dashboard-layout.css">
    <link rel="stylesheet" href="css/accounts.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/transactions.css">
    <link rel="stylesheet" href="css/investments.css">
    <link rel="stylesheet" href="css/debt.css">
    <link rel="stylesheet" href="css/bills.css">
    <link rel="stylesheet" href="css/rules.css">
    <link rel="stylesheet" href="css/settings.css">
</head>
<body>
    <!-- Background Effects -->
    <div class="background-effects">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>
    
    <!-- Main App Container -->
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <!-- Header/Brand Section -->
            <div class="sidebar-header">
                <div class="brand-container">
                    <div class="brand-icon">
                        <span>⚡</span>
                    </div>
                    <div class="brand-info">
                        <h2 class="brand-name">Ryokushen</h2>
                        <p class="brand-tagline">Financial Tracker</p>
                    </div>
                </div>
            </div>
            
            <!-- Navigation Menu -->
            <div class="nav-container">
                <button class="nav-item active" data-page="dashboard">
                    <div class="nav-item-content">
                        <span class="nav-icon">📊</span>
                        <span class="nav-text">Dashboard</span>
                    </div>
                    <div class="nav-item-badges">
                        <div class="active-indicator"></div>
                    </div>
                </button>
                
                <button class="nav-item" data-page="accounts">
                    <div class="nav-item-content">
                        <span class="nav-icon">💰</span>
                        <span class="nav-text">Accounts</span>
                    </div>
                </button>
                
                <button class="nav-item" data-page="transactions">
                    <div class="nav-item-content">
                        <span class="nav-icon">💸</span>
                        <span class="nav-text">Transactions</span>
                    </div>
                    <div class="nav-item-badges">
                        <span class="badge">12</span>
                    </div>
                </button>
                
                <button class="nav-item" data-page="investments">
                    <div class="nav-item-content">
                        <span class="nav-icon">📈</span>
                        <span class="nav-text">Investments</span>
                    </div>
                </button>
                
                <button class="nav-item" data-page="debt">
                    <div class="nav-item-content">
                        <span class="nav-icon">💳</span>
                        <span class="nav-text">Debt</span>
                    </div>
                    <div class="nav-item-badges">
                        <span class="badge">3</span>
                    </div>
                </button>
                
                <button class="nav-item" data-page="bills">
                    <div class="nav-item-content">
                        <span class="nav-icon">📅</span>
                        <span class="nav-text">Bills</span>
                    </div>
                </button>
                
                <button class="nav-item" data-page="rules">
                    <div class="nav-item-content">
                        <span class="nav-icon">🎯</span>
                        <span class="nav-text">Rules</span>
                    </div>
                </button>
                
                <button class="nav-item" data-page="settings">
                    <div class="nav-item-content">
                        <span class="nav-icon">⚙️</span>
                        <span class="nav-text">Settings</span>
                    </div>
                </button>
                
                <!-- Divider -->
                <div class="nav-divider"></div>
                
                <!-- Additional Menu Items -->
                <button class="nav-item">
                    <div class="nav-item-content">
                        <span class="nav-icon">❓</span>
                        <span class="nav-text">Help & Support</span>
                    </div>
                </button>
                
                <button class="nav-item">
                    <div class="nav-item-content">
                        <span class="nav-icon">🔔</span>
                        <span class="nav-text">Notifications</span>
                    </div>
                    <div class="nav-item-badges">
                        <span class="badge">3</span>
                    </div>
                </button>
            </div>
            
            <!-- Premium Upgrade Section -->
            <div class="premium-section">
                <div class="premium-card">
                    <div class="premium-header">
                        <div class="premium-icon">
                            <span>🛡️</span>
                        </div>
                        <div class="premium-info">
                            <span class="premium-title">Premium Plan</span>
                            <p class="premium-subtitle">Advanced Features</p>
                        </div>
                    </div>
                    
                    <p class="premium-description">
                        Unlock advanced analytics, automation, and unlimited transaction history
                    </p>
                    
                    <button class="premium-button">
                        Upgrade Now
                    </button>
                    
                    <div class="premium-dots">
                        <span class="dot dot-1"></span>
                        <span class="dot dot-2"></span>
                        <span class="dot dot-3"></span>
                    </div>
                </div>
            </div>
            
            <!-- User Profile Section -->
            <div class="user-section">
                <div class="user-profile">
                    <div class="user-avatar">
                        <span>👤</span>
                    </div>
                    <div class="user-info">
                        <p class="user-email" id="user-email">Loading...</p>
                        <p class="user-status">Premium Member</p>
                    </div>
                    <button class="logout-btn" id="logout-btn">
                        <span>🚪</span>
                    </button>
                </div>
            </div>
        </nav>
        
        <!-- Main Content Area -->
        <main class="main-content" id="main-content">
            <!-- Top Bar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="mobile-menu-toggle" id="mobile-menu-toggle">☰</button>
                    <h1 class="page-title" id="page-title">Dashboard</h1>
                </div>
                <div class="topbar-right">
                    <button class="theme-toggle" id="theme-toggle">
                        <span class="theme-icon">🌙</span>
                    </button>
                    <button class="notifications-toggle" id="notifications-toggle">
                        <span class="notification-icon">🔔</span>
                        <span class="notification-badge">3</span>
                    </button>
                </div>
            </header>
            
            <!-- Page Content -->
            <div class="page-content" id="page-content">
                <!-- Content will be dynamically loaded here -->
            </div>
        </main>
    </div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Ryokushen...</div>
    </div>
    
    <!-- Auth Modal -->
    <div class="auth-modal" id="auth-modal" style="display: none;">
        <div class="auth-container glass-panel">
            <div class="auth-header">
                <h2>Welcome to Ryokushen</h2>
                <p>Your personal financial command center</p>
            </div>
            <div class="auth-content" id="auth-content">
                <!-- Auth forms will be inserted here -->
            </div>
        </div>
    </div>
    
    <!-- Modern UI Scripts -->
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
